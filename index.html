<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>HT-SECURITY // COMMAND CENTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root {
  --c-blue: #00d2ff; --c-blue-dim: rgba(0,210,255,0.15); --c-blue-glow: rgba(0,210,255,0.4);
  --c-green: #00ff88; --c-green-dim: rgba(0,255,136,0.15); --c-green-glow: rgba(0,255,136,0.4);
  --c-red: #ff3366; --c-amber: #ffb700; --bg-void: #020810; --bg-deep: #030d1a;
  --bg-panel: rgba(4,14,28,0.85); --bg-card: rgba(6,18,36,0.8); --bg-input: rgba(3,10,22,0.95);
  --border-dim: rgba(0,210,255,0.15); --border-mid: rgba(0,210,255,0.3); --border-hi: rgba(0,210,255,0.5);
  --txt-hi: #ffffff; --txt-mid: #8bc1df; --font-mono: 'Share Tech Mono', monospace;
  --font-ui: 'Rajdhani', sans-serif; --font-display: 'Orbitron', monospace;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-void); color: var(--txt-hi); font-family: var(--font-ui); font-size: 16px; cursor: crosshair; }
#file-input, #bcast-file-input { display: none !important; }
.world { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.grid-layer { position: absolute; inset: -100px; background-image: linear-gradient(rgba(0,210,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,210,255,0.05) 1px, transparent 1px); background-size: 50px 50px; animation: grid-move 25s linear infinite; }
.grid-layer-2 { position: absolute; inset: -100px; background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px); background-size: 200px 200px; animation: grid-move 60s linear infinite reverse; }
@keyframes grid-move { 0% { transform: translateY(0) translateX(0); } 100% { transform: translateY(50px) translateX(50px); } }
.atm-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; }
.atm-blob-1 { width:600px;height:400px; background:var(--c-blue); top:-100px; left:-100px; animation:blob-drift 20s ease-in-out infinite; }
.atm-blob-2 { width:500px;height:500px; background:var(--c-green); bottom:-150px; right:-100px; animation:blob-drift 28s ease-in-out infinite reverse; }
.scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px); }

/* Login Screen */
.login-screen { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse 100% 100% at 50% 50%, rgba(0,30,60,0.85) 0%, rgba(2,8,16,0.97) 70%); backdrop-filter: blur(8px); animation: screen-in .5s ease-out; }
.login-screen.gone { display: none; }
@keyframes screen-in { from{opacity:0} to{opacity:1} }
.login-frame { position: relative; width: 90%; max-width: 520px; background: var(--bg-panel); border: 1px solid var(--border-hi); backdrop-filter: blur(30px); padding: 40px; text-align: center; clip-path: polygon(25px 0, 100% 0, 100% calc(100% - 25px), calc(100% - 25px) 100%, 0 100%, 0 25px); animation: frame-drop .55s cubic-bezier(.16,1,.3,1); }
@keyframes frame-drop { from { opacity:0; transform:translateY(-20px) scale(0.97); } to { opacity:1; transform:none; } }
.login-title { font-family: var(--font-display); font-size: 28px; font-weight: 900; letter-spacing: 5px; background: linear-gradient(90deg, var(--c-blue), var(--c-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
.tac-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border-mid); color: var(--txt-hi); font-family: var(--font-mono); font-size: 18px; padding: 15px; outline: none; direction: rtl; margin-bottom: 15px; }
.tac-btn { width: 100%; padding: 18px; background: transparent; border: 1px solid var(--border-hi); color: var(--c-blue); font-family: var(--font-display); font-size: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: all .15s; margin-top: 10px;}
.tac-btn:hover { box-shadow: 0 0 24px var(--c-blue-glow); background: rgba(0,210,255,0.08); }

/* App Layout */
#app { display: grid; grid-template-rows: 70px 1fr; grid-template-columns: 460px 1fr 400px; width: 100%; height: 100%; gap: 2px; background: var(--border-dim); position: relative; z-index: 1; }
.topbar { grid-column: 1 / -1; background: rgba(2,8,18,0.95); border-bottom: 1px solid var(--border-mid); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; }
.brand-name { font-family: var(--font-display); font-size: 20px; font-weight: 900; letter-spacing: 4px; color: var(--c-blue); }

.metrics-bar { display: flex; align-items: center; gap: 0; flex: 1; justify-content: center; }
.metric-item { display: flex; flex-direction: column; align-items: center; padding: 0 32px; border-left: 1px solid var(--border-mid); }
.metric-item:last-child { border-right: 1px solid var(--border-mid); }
.metric-val { font-family: var(--font-display); font-size: 24px; font-weight: 700; line-height: 1; color: var(--c-blue); text-shadow: 0 0 12px var(--c-blue); }
.metric-val.green { color: var(--c-green); text-shadow: 0 0 12px var(--c-green); }
.metric-lbl { font-family: var(--font-mono); font-size: 11px; font-weight: bold; letter-spacing: 3px; color: var(--txt-mid); text-transform: uppercase; margin-top: 6px; }

/* Panels */
.panel-left, .panel-right { background: var(--bg-panel); display: flex; flex-direction: column; overflow: hidden; position: relative; border-right: 1px solid var(--border-mid); }
.panel-center { background: rgba(3,10,20,0.85); display: flex; flex-direction: column; overflow: hidden; }

.panel-head { padding: 20px 24px; border-bottom: 1px solid var(--border-mid); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: rgba(0,0,0,0.2); font-family: var(--font-mono); font-weight:bold; }
.ph-label { font-size: 14px; letter-spacing: 4px; color: var(--txt-mid); text-transform: uppercase; }

/* Left Panel */
.mic-block { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px; margin: 20px; border: 1px solid; cursor: pointer; transition: all .2s; font-family: var(--font-mono); font-weight:bold; }
.mic-block.off { border-color:rgba(255,34,85,.5); background:rgba(255,34,85,.1); color:var(--c-red); }
.mic-block.on  { border-color:rgba(0,255,136,.5); background:rgba(0,255,136,.1); color:var(--c-green); }

.nodes-scroll { flex:1; overflow-y:auto; padding:16px; }
.node-card { display: flex; align-items: center; gap: 16px; padding: 14px 20px; margin-bottom: 10px; border: 1px solid transparent; cursor: pointer; }
.node-card:hover { border-color: var(--border-mid); background: rgba(0,210,255,0.05); }
.node-card.active { border-color: var(--c-blue); background: var(--c-blue-dim); }
.nc-avatar { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border-hi); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; color: var(--c-blue); }
.nc-info { flex:1; }
.nc-id { font-family:var(--font-mono); font-size:16px; font-weight:bold; }
.nc-state { font-family:var(--font-mono); font-size:12px; margin-top:5px; color:var(--c-green); }

/* Center Panel */
.console-msgs { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:12px; }
.cmd-row { display:flex; margin-bottom:8px; }
.cmd-row.out { justify-content:flex-end; }
.cmd-row.in  { justify-content:flex-start; }
.cmd-bubble { max-width:85%; padding: 14px 22px; font-family:var(--font-mono); font-size:17px; line-height:1.6; word-break:break-word; border:1px solid; border-radius: 4px; }
.cmd-row.out .cmd-bubble { background:rgba(0,60,120,.4); border-color:var(--c-blue); }
.cmd-row.in .cmd-bubble { background:rgba(0,40,30,.5); border-color:var(--c-green); }

.bcast-msg { align-self:stretch; border:1px solid rgba(255,183,0,.4); background:rgba(255,183,0,.15); padding:16px; font-family:var(--font-mono); color:var(--c-amber); margin: 8px 0; }

.data-packet { max-width:80%; border:1px solid rgba(0,210,255,.5); background:rgba(0,40,80,.4); padding:10px; cursor:pointer; }
.pkt-row.in .data-packet { border-color:rgba(0,255,136,.4); background:rgba(0,30,20,.5); }

.input-zone { padding:20px 24px; border-top:1px solid var(--border-mid); background:rgba(2,7,16,.95); display:flex; gap:15px; }
.inp-field { flex:1; background:transparent; border:none; border-bottom:2px solid var(--border-dim); color:var(--txt-hi); font-family:var(--font-mono); font-size:20px; padding:10px; outline:none; direction:rtl; }
.inp-send-btn { padding:10px 25px; background:var(--c-blue); border:none; color:#000; font-family:var(--font-mono); font-weight:bold; cursor:pointer; }
.inp-file-btn { background:transparent; border:1px solid var(--c-blue); color:var(--c-blue); border-radius:50%; width:45px; height:45px; cursor:pointer; }

/* Right Panel */
.activity-log { flex:1; overflow-y:auto; padding:20px; font-family:var(--font-mono); font-size:13px; }
.act-msg.g { color:var(--c-green); }
.act-msg.r { color:var(--c-red); }

/* MOBILE RESPONSIVENESS */
@media (max-width: 1024px) {
  html, body { overflow: hidden !important; height: 100dvh !important; position: fixed !important; }
  #app { display: grid !important; grid-template-rows: 60px 1fr !important; grid-template-columns: 140px 1fr !important; height: 100dvh !important; gap:0;}
  .topbar { grid-column: 1 / -1; height: 60px; padding: 0 15px; }
  .metrics-bar { display: none; }
  .panel-left { grid-column: 1 / 2 !important; border-left: 1px solid var(--border-hi); height: 100%; border-right:none;}
  .panel-center { grid-column: 2 / 3 !important; border: none; height: 100%; }
  .panel-right { display: none !important; }
  .cmd-bubble { max-width: 95%; font-size: 14px; padding: 10px; }
  .input-zone { padding: 10px; gap: 5px; flex-wrap: nowrap; }
  .inp-field { font-size: 14px; padding: 5px; }
  .login-frame { width: 92%; max-width: 400px; padding: 20px; }
}
</style>
</head>
<body>

<div class="world">
  <div class="grid-layer"></div>
  <div class="scanlines"></div>
</div>

<input type="file" id="file-input">
<input type="file" id="bcast-file-input">

<div class="login-screen" id="login-screen">
  <div class="login-frame">
    <div class="login-title">HT-SECURITY</div>
    <div class="lf-group">
      <input class="tac-input" id="inp-room" type="text" placeholder="מזהה חדר..." autocomplete="off">
      <input class="tac-input" id="inp-pass" type="password" placeholder="מפתח הצפנה...">
    </div>
    <button class="tac-btn" id="btn-connect">INITIATE SECURE CONNECTION</button>
  </div>
</div>

<div id="app" style="display:none">
  <header class="topbar">
    <div class="brand-name">HT-SECURITY // MESH</div>
    <div class="metrics-bar">
      <div class="metric-item"><div class="metric-val" id="m-nodes">0</div><div class="metric-lbl">NODES</div></div>
      <div class="metric-item"><div class="metric-val green" id="m-msgs">0</div><div class="metric-lbl">MSG TX</div></div>
    </div>
    <div style="font-family:var(--font-mono); font-size:14px; color:var(--txt-mid);">ID: <em id="my-id-el" style="color:var(--c-blue);font-style:normal;">---</em></div>
  </header>

  <aside class="panel-left">
    <div class="panel-head"><span class="ph-label">NETWORK</span></div>
    <div class="mic-block off" id="mic-block"><span id="mic-txt">MIC OFFLINE</span></div>
    <div class="nodes-scroll" id="nodes-scroll"></div>
  </aside>

  <main class="panel-center">
    <div class="console-head">
      <div class="ch-target">CHANNEL › <em id="ch-target">SELECT NODE</em></div>
    </div>
    <div class="console-msgs" id="console-msgs"></div>
    <div class="input-zone">
      <button class="inp-file-btn" id="btn-attach" disabled>📎</button>
      <input class="inp-field" id="inp-msg" type="text" placeholder="הודעה מוצפנת..." disabled>
      <button class="inp-send-btn" id="btn-send" disabled>SEND</button>
    </div>
  </main>

  <aside class="panel-right">
    <div class="panel-head"><span class="ph-label">ACTIVITY LOG</span></div>
    <div class="activity-log" id="activity-log"></div>
  </aside>
</div>

<script>
'use strict';

const SIGNAL_URL = "https://ht-security-signaling-mesh.onrender.com";
const ICE_CONFIG  = [{ urls: 'stun:stun.l.google.com:19302' }];
const CHUNK_BYTES = 16 * 1024; 

const peers = new Map();   
let socket      = null;
let localStream = null;    
let myId        = null;
let currentRoom = null;
let authToken   = null;    
let cryptoKey   = null;    
let activePeer  = null;
let totalMsgs   = 0;
let micOn       = false;

const $ = id => document.getElementById(id);
const loginScreen  = $('login-screen');
const appEl        = $('app');

async function deriveKey(pass, room) {
  const e = new TextEncoder();
  const base = await crypto.subtle.importKey('raw', e.encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:e.encode(room), iterations:100000, hash:'SHA-256' },
    base, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}

async function encrypt(plainBuf) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, cryptoKey, plainBuf);
  const out = new Uint8Array(12 + ct.byteLength);
  out.set(iv); out.set(new Uint8Array(ct), 12);
  return out.buffer;
}

async function decrypt(encBuf) {
  const a = new Uint8Array(encBuf);
  return crypto.subtle.decrypt({ name:'AES-GCM', iv:a.slice(0,12) }, cryptoKey, a.slice(12));
}

const ts = () => new Date().toLocaleTimeString('he-IL', { hour12:false });

$('btn-connect').onclick = async () => {
  const room = $('inp-room').value.trim();
  const pass = $('inp-pass').value.trim(); 
  if (!room || !pass) return;
  $('btn-connect').textContent = 'INITIALIZING...';
  $('btn-connect').disabled = true;

  cryptoKey   = await deriveKey(pass, room);
  authToken   = btoa(room + ":" + pass);
  currentRoom = room;

  loginScreen.classList.add('gone');
  appEl.style.display = 'grid'; 

  initSocket();
};

function initSocket() {
  socket = io(SIGNAL_URL, { transports: ['websocket'] });

  socket.on('connect', () => {
    myId = socket.id;
    $('my-id-el').textContent = myId.substring(0,6);
    socket.emit('join-room', { room: currentRoom });
    logAct('SOCKET CONNECTED', 'g');
    updateStats();
  });

  socket.on('disconnect', () => {
    cleanAll();
    logAct('SOCKET DISCONNECTED', 'r');
  });

  socket.on('room-peers', async ({ peers: existing }) => {
    for (const pid of existing) {
      if (pid !== myId && !peers.has(pid)) await mkPeer(pid, true);
    }
  });

  socket.on('user-connected', async ({ peerId }) => {
    logAct(`+NODE ${peerId.substring(0,4)}`, 'g');
    if (!peers.has(peerId)) await mkPeer(peerId, false);
  });

  socket.on('user-disconnected', ({ peerId }) => {
    logAct(`-NODE ${peerId.substring(0,4)}`, 'r');
    cleanPeer(peerId);
  });

  socket.on('offer', async (data) => {
    if (data.token !== authToken) return;
    if (!peers.has(data.from)) await mkPeer(data.from, false);
    const p = peers.get(data.from);
    if(p && p.pc) {
        await p.pc.setRemoteDescription(new RTCSessionDescription(data.offer));
        const ans = await p.pc.createAnswer();
        await p.pc.setLocalDescription(ans);
        socket.emit('answer', { to: data.from, answer: ans, token: authToken });
    }
  });

  socket.on('answer', async (data) => {
    if (data.token !== authToken) return;
    const e = peers.get(data.from);
    if (e && e.pc) try { await e.pc.setRemoteDescription(new RTCSessionDescription(data.answer)); } catch(err) {}
  });

  socket.on('ice-candidate', async (data) => {
    if (data.token !== authToken) return;
    const e = peers.get(data.from);
    if (e && e.pc && data.candidate) try { await e.pc.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(err) {}
  });
}

async function mkPeer(pid, isInit) {
  const pc = new RTCPeerConnection({ iceServers: ICE_CONFIG });
  const entry = { pc, dc: null, audioEl: null };
  peers.set(pid, entry);

  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  if (isInit) {
    const dc = pc.createDataChannel('sec', { ordered: true });
    dc.binaryType = 'arraybuffer';
    entry.dc = dc;
    wireDC(dc, pid);
  } else {
    pc.ondatachannel = ({ channel }) => {
      channel.binaryType = 'arraybuffer';
      entry.dc = channel;
      wireDC(channel, pid);
    };
  }

  pc.ontrack = ({ streams }) => {
    if (!streams || !streams[0] || entry.audioEl) return;
    const a = document.createElement('audio');
    a.autoplay = true; a.srcObject = streams[0];
    document.body.appendChild(a);
    entry.audioEl = a;
  };

  pc.onicecandidate = ({ candidate }) => {
    if (candidate) socket.emit('ice-candidate', { to: pid, candidate, token: authToken });
  };

  pc.onconnectionstatechange = () => {
    renderNodes(); updateStats();
    if (pc.connectionState === 'failed' || pc.connectionState === 'closed') cleanPeer(pid);
    if (pc.connectionState === 'connected') logAct(`LINK UP: ${pid.substring(0,4)}`, 'g');
  };

  if (isInit) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('offer', { to: pid, offer, token: authToken });
  }

  renderNodes(); updateStats();
  return entry;
}

function wireDC(dc, pid) {
  dc.onmessage = async ({ data }) => {
    try {
      const plain = await decrypt(data);
      const msg = JSON.parse(new TextDecoder().decode(plain));
      if (msg.type === 'text') {
        totalMsgs++;
        appendCmd(msg.content, 'in', pid);
        updateStats();
      }
    } catch(err) {}
  };
}

$('btn-send').onclick = async () => {
  const text = $('inp-msg').value.trim();
  if (!text || !activePeer) return;
  const e = peers.get(activePeer);
  if (!e || !e.dc || e.dc.readyState !== 'open') return;

  const enc = await encrypt(new TextEncoder().encode(JSON.stringify({ type:'text', content:text })));
  e.dc.send(enc);
  appendCmd(text, 'out', myId);
  $('inp-msg').value = '';
  totalMsgs++; updateStats();
};

if ($('mic-block')) {
  $('mic-block').onclick = async () => {
    if (!micOn) {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
        micOn = true;
        $('mic-block').className = 'mic-block on';
        $('mic-txt').textContent = 'MIC LIVE';
        peers.forEach(e => localStream.getTracks().forEach(t => e.pc.addTrack(t, localStream)));
        logAct('MIC ARMED', 'g');
      } catch (err) { logAct('MIC DENIED', 'r'); }
    } else {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop()); localStream = null;
        micOn = false;
        $('mic-block').className = 'mic-block off';
        $('mic-txt').textContent = 'MIC OFFLINE';
        logAct('MIC MUTED', 'g');
      }
    }
  };
}

function cleanPeer(pid) {
  const e = peers.get(pid);
  if (!e) return;
  if (e.dc) try{e.dc.close();}catch(err){} 
  if (e.pc) try{e.pc.close();}catch(err){} 
  if (e.audioEl) e.audioEl.remove(); 
  peers.delete(pid);
  if (activePeer === pid) { activePeer=null; $('ch-target').textContent = 'SELECT NODE'; $('inp-msg').disabled = true; $('btn-send').disabled = true; }
  renderNodes(); updateStats();
}

function cleanAll() {
  const pids = []; peers.forEach((v, k) => pids.push(k)); pids.forEach(cleanPeer);
}

function renderNodes() {
  $('nodes-scroll').innerHTML = '';
  if (peers.size === 0) { $('nodes-scroll').innerHTML = '<div style="text-align:center; padding:20px; color:var(--txt-mid); font-family:var(--font-mono); font-size:12px;">SCANNING...</div>'; return; }

  peers.forEach((entry, pid) => {
    const st = entry.pc ? entry.pc.connectionState : 'failed';
    const card = document.createElement('div');
    card.className = `node-card${activePeer === pid ? ' active' : ''}`;
    card.innerHTML = `<div class="nc-avatar">${pid.substring(0,2).toUpperCase()}</div><div class="nc-info"><div class="nc-id">${pid.substring(0,6)}</div><div class="nc-state ${st}">${st.toUpperCase()}</div></div>`;
    card.onclick = () => { activePeer = pid; $('ch-target').textContent = pid.substring(0,6); $('inp-msg').disabled = false; $('btn-send').disabled = false; $('btn-attach').disabled = false; renderNodes(); };
    $('nodes-scroll').appendChild(card);
  });
}

function appendCmd(text, dir, fromId) {
  const row = document.createElement('div');
  row.className = `cmd-row ${dir}`;
  const d = document.createElement('div'); d.textContent = text;
  row.innerHTML = `<div class="cmd-bubble"><div class="cmd-meta">${dir==='in'?fromId.substring(0,4)+' RX':'TX'} · ${ts()}</div>${d.innerHTML}</div>`;
  $('console-msgs').appendChild(row);
  $('console-msgs').scrollTop = $('console-msgs').scrollHeight;
}

function logAct(msg, cls) {
  if(!$('activity-log')) return;
  const d = document.createElement('div');
  d.className = 'act-entry';
  d.innerHTML = `<span class="act-ts">${ts()}</span><span class="act-msg ${cls}">${msg}</span>`;
  $('activity-log').appendChild(d);
  $('activity-log').scrollTop = $('activity-log').scrollHeight;
}

function updateStats() {
  const n = (socket && socket.connected) ? peers.size + 1 : 0;
  if($('n-count')) $('n-count').textContent = n;
  if($('m-nodes')) $('m-nodes').textContent = n;
  if($('m-msgs')) $('m-msgs').textContent = totalMsgs;
}
</script>
