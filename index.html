<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>HT-SECURITY // COMMAND CENTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
/* ══════════════════════════════════════════════
   TACTICAL ROOT VARIABLES
══════════════════════════════════════════════ */
:root {
  --c-blue:       #00d2ff;
  --c-blue-dim:   rgba(0,210,255,0.15);
  --c-blue-glow:  rgba(0,210,255,0.4);
  --c-green:      #00ff88;
  --c-green-dim:  rgba(0,255,136,0.15);
  --c-green-glow: rgba(0,255,136,0.4);
  --c-red:        #ff3366;
  --c-red-dim:    rgba(255,51,102,0.15);
  --c-amber:      #ffb700;
  --c-amber-dim:  rgba(255,183,0,0.15);
  --bg-void:      #020810;
  --bg-panel:     rgba(4,14,28,0.9);
  --bg-input:     rgba(3,10,22,0.95);
  --border-hi:    rgba(0,210,255,0.5);
  --txt-hi:       #ffffff;
  --font-mono:    'Share Tech Mono', monospace;
  --font-ui:      'Rajdhani', sans-serif;
  --font-display: 'Orbitron', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-void); color: var(--txt-hi); font-family: var(--font-ui); }

/* ══════════════════════════════════════════════
   BACKGROUND LAYERS
══════════════════════════════════════════════ */
.world { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.grid-layer { position: absolute; inset: -100px; background-image: linear-gradient(rgba(0,210,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,210,255,0.05) 1px, transparent 1px); background-size: 50px 50px; }
.scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px); }

/* ══════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════ */
.login-screen { position: fixed; inset: 0; z-index: 999; display: flex; align-items: center; justify-content: center; background: var(--bg-void); backdrop-filter: blur(10px); }
.login-screen.gone { display: none; }
.login-frame { width: 90%; max-width: 450px; background: var(--bg-panel); border: 1px solid var(--border-hi); padding: 40px; clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px); }
.login-title { font-family: var(--font-display); font-size: 24px; color: var(--c-blue); text-align: center; margin-bottom: 30px; letter-spacing: 4px; }
.tac-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border-hi); color: #fff; padding: 15px; margin-bottom: 15px; font-family: var(--font-mono); outline: none; direction: rtl; }
.tac-btn { width: 100%; padding: 18px; background: transparent; border: 1px solid var(--c-blue); color: var(--c-blue); font-family: var(--font-display); cursor: pointer; transition: 0.3s; }
.tac-btn:hover { background: var(--c-blue-dim); box-shadow: 0 0 15px var(--c-blue-glow); }
.login-status { font-family: var(--font-mono); font-size: 12px; color: var(--c-amber); text-align: center; margin-top: 15px; min-height: 15px; }

/* ══════════════════════════════════════════════
   MAIN APP LAYOUT
══════════════════════════════════════════════ */
#app { position: relative; z-index: 10; display: grid; grid-template-rows: 60px 1fr; grid-template-columns: 350px 1fr 300px; width: 100%; height: 100%; background: var(--bg-void); }

.topbar { grid-column: 1 / -1; background: #000; border-bottom: 1px solid var(--border-hi); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
.brand-name { font-family: var(--font-display); color: var(--c-blue); font-size: 18px; letter-spacing: 2px; }

.panel-left { background: var(--bg-panel); border-left: 1px solid var(--border-hi); display: flex; flex-direction: column; }
.panel-center { display: flex; flex-direction: column; background: rgba(0,0,0,0.4); border-left: 1px solid var(--border-hi); }
.panel-right { background: var(--bg-panel); border-left: 1px solid var(--border-hi); display: flex; flex-direction: column; }

.panel-head { padding: 15px; background: rgba(0,210,255,0.1); font-family: var(--font-display); font-size: 14px; border-bottom: 1px solid var(--border-hi); }

/* Messages */
.console-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.cmd-row { display: flex; margin-bottom: 5px; }
.cmd-row.out { justify-content: flex-end; }
.cmd-row.in { justify-content: flex-start; }
.cmd-bubble { max-width: 80%; padding: 10px 15px; font-family: var(--font-mono); border: 1px solid; border-radius: 4px; font-size: 15px; }
.cmd-row.out .cmd-bubble { border-color: var(--c-blue); background: var(--c-blue-dim); }
.cmd-row.in .cmd-bubble { border-color: var(--c-green); background: var(--c-green-dim); }

/* Input Zone */
.input-zone { padding: 15px; border-top: 1px solid var(--border-hi); display: flex; gap: 10px; background: #000; }
.inp-field { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--c-blue); color: #fff; padding: 5px; outline: none; font-family: var(--font-mono); font-size: 16px; direction: rtl; }
.send-btn { background: var(--c-blue); color: #000; border: none; padding: 10px 20px; font-family: var(--font-display); cursor: pointer; }

/* ══════════════════════════════════════════════
   MOBILE RESPONSIVENESS (2-COLUMN LOCK)
══════════════════════════════════════════════ */
@media (max-width: 1024px) {
  html, body { overflow: hidden !important; position: fixed; }
  
  #app { 
    display: grid !important; 
    grid-template-rows: 50px 1fr !important; 
    /* עמודה ימנית למשתמשים (110px), עמודה שמאלית לצ'אט */
    grid-template-columns: 110px 1fr !important; 
  }
  
  .topbar { grid-column: 1 / -1; height: 50px; }
  .brand-name { font-size: 14px; }
  
  /* משתמשים מימין */
  .panel-left { 
    grid-column: 1 / 2 !important; 
    border-left: 1px solid var(--border-hi);
  }
  
  /* צ'אט משמאל */
  .panel-center { 
    grid-column: 2 / 3 !important; 
    border-left: none;
  }
  
  .panel-right { display: none !important; }
  
  .panel-head { font-size: 11px; padding: 8px; }
  .cmd-bubble { max-width: 95%; font-size: 14px; }
  .input-zone { padding: 8px; }
  .send-btn { padding: 8px 12px; font-size: 12px; }
}

/* Node Cards */
.node-card { padding: 10px; border-bottom: 1px solid var(--border-hi); cursor: pointer; }
.node-card.active { background: var(--c-blue-dim); }
.nc-id { font-family: var(--font-mono); font-size: 13px; }
</style>
</head>
<body>

<div class="world">
  <div class="grid-layer"></div>
  <div class="scanlines"></div>
</div>

<div class="login-screen" id="login-screen">
  <div class="login-frame">
    <div class="login-title">HT-SECURITY // MESH</div>
    <input class="tac-input" id="inp-room" type="text" placeholder="מזהה חדר..." autocomplete="off">
    <input class="tac-input" id="inp-pass" type="password" placeholder="מפתח הצפנה...">
    <button class="tac-btn" id="btn-connect">INITIATE CONNECTION</button>
    <div class="login-status" id="login-status">AWAITING SYSTEM INITIALIZATION</div>
  </div>
</div>

<div id="app" style="display:none">
  <header class="topbar">
    <div class="brand-name">HT-SECURITY // COMMAND</div>
    <div id="my-id-el" style="font-family:var(--font-mono); font-size:12px; color:var(--c-amber)">NODE: ---</div>
  </header>

  <aside class="panel-left">
    <div class="panel-head">MESH NODES</div>
    <div id="nodes-scroll" style="flex:1; overflow-y:auto;"></div>
  </aside>

  <main class="panel-center">
    <div class="panel-head">CHANNEL: <em id="ch-target">SELECT NODE</em></div>
    <div class="console-msgs" id="console-msgs"></div>
    <div class="input-zone">
      <input class="inp-field" id="inp-msg" type="text" placeholder="הודעה מוצפנת..." disabled>
      <button class="send-btn" id="btn-send" disabled>SEND</button>
    </div>
  </main>

  <aside class="panel-right">
    <div class="panel-head">ACTIVITY LOG</div>
    <div id="activity-log" style="flex:1; overflow-y:auto; padding:10px; font-family:var(--font-mono); font-size:11px;"></div>
  </aside>
</div>

<script>
'use strict';

const SIGNAL_URL = 'https://ht-security-signaling-mesh.onrender.com';
const peers = new Map();
let socket, cryptoKey, authToken, myId, activePeer;

const $ = id => document.getElementById(id);

async function deriveKey(pass, room) {
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:enc.encode(room), iterations:100000, hash:'SHA-256' },
    base, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}

async function encrypt(data) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, cryptoKey, data);
  const out = new Uint8Array(12 + ct.byteLength);
  out.set(iv); out.set(new Uint8Array(ct), 12);
  return out.buffer;
}

async function decrypt(buf) {
  const a = new Uint8Array(buf);
  return crypto.subtle.decrypt({ name:'AES-GCM', iv:a.slice(0,12) }, cryptoKey, a.slice(12));
}

$('btn-connect').onclick = async () => {
  const room = $('inp-room').value.trim();
  const pass = $('inp-pass').value.trim();
  if(!room || !pass) return;

  $('btn-connect').disabled = true;
  $('btn-connect').textContent = 'AUTHENTICATING...';
  $('login-status').textContent = 'DERIVING CRYPTO KEYS...';

  try {
    cryptoKey = await deriveKey(pass, room);
    authToken = btoa(room + ":" + pass);
    
    if (typeof io === 'undefined') {
        throw new Error('Socket.io library not loaded. Check connection.');
    }

    socket = io(SIGNAL_URL, { 
        transports: ['websocket', 'polling'],
        timeout: 20000 
    });

    $('login-status').textContent = 'CONNECTING TO MESH SERVER...';

    socket.on('connect', () => {
      myId = socket.id;
      $('my-id-el').textContent = 'NODE: ' + myId.substring(0,6);
      socket.emit('join-room', { room });
      
      $('login-screen').classList.add('gone');
      $('app').style.display = 'grid';
      log('CONNECTED TO MESH SERVER', 'g');
    });

    socket.on('connect_error', (err) => {
        $('login-status').textContent = 'SERVER UNREACHABLE. RETRYING...';
        console.error('Socket Error:', err);
    });

    socket.on('room-peers', d => d.peers.forEach(pid => mkPeer(pid, true)));
    socket.on('user-connected', d => mkPeer(d.peerId, false));
    socket.on('user-disconnected', d => cleanPeer(d.peerId));
    
    socket.on('offer', async d => {
      if(d.token !== authToken) return;
      if(!peers.has(d.from)) await mkPeer(d.from, false);
      const p = peers.get(d.from);
      await p.pc.setRemoteDescription(new RTCSessionDescription(d.offer));
      const ans = await p.pc.createAnswer();
      await p.pc.setLocalDescription(ans);
      socket.emit('answer', { to: d.from, answer: ans, token: authToken });
    });

    socket.on('answer', d => peers.has(d.from) && peers.get(d.from).pc.setRemoteDescription(new RTCSessionDescription(d.answer)));
    socket.on('ice-candidate', d => peers.has(d.from) && peers.get(d.from).pc.addIceCandidate(new RTCIceCandidate(d.candidate)));

  } catch (e) {
    $('login-status').textContent = 'ERROR: ' + e.message;
    $('btn-connect').disabled = false;
    $('btn-connect').textContent = 'RETRY CONNECTION';
  }
};

async function mkPeer(pid, init) {
  if (pid === myId) return;
  const pc = new RTCPeerConnection({ iceServers: [{urls:'stun:stun.l.google.com:19302'}] });
  const entry = { pc, dc: null };
  peers.set(pid, entry);

  pc.onicecandidate = e => e.candidate && socket.emit('ice-candidate', { to: pid, candidate: e.candidate, token: authToken });
  pc.onconnectionstatechange = () => { if(pc.connectionState==='connected') log('P2P SECURED: ' + pid.substring(0,4), 'g'); };

  if(init) {
    entry.dc = pc.createDataChannel('sec');
    wireDC(entry.dc, pid);
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('offer', { to: pid, offer, token: authToken });
  } else {
    pc.ondatachannel = e => { entry.dc = e.channel; wireDC(e.channel, pid); };
  }
  renderNodes();
}

function wireDC(dc, pid) {
  dc.binaryType = 'arraybuffer';
  dc.onmessage = async e => {
    try {
      const plain = await decrypt(e.data);
      const msg = JSON.parse(new TextDecoder().decode(plain));
      if(msg.type==='text') appendMsg(msg.val, 'in', pid);
    } catch(err) { console.error('Decryption failed'); }
  };
  dc.onopen = () => renderNodes();
}

$('btn-send').onclick = async () => {
  const val = $('inp-msg').value;
  if(!val || !activePeer) return;
  const enc = await encrypt(new TextEncoder().encode(JSON.stringify({type:'text', val})));
  peers.get(activePeer).dc.send(enc);
  appendMsg(val, 'out', myId);
  $('inp-msg').value = '';
};

function renderNodes() {
  $('nodes-scroll').innerHTML = '';
  peers.forEach((v,k) => {
    const d = document.createElement('div');
    d.className = 'node-card' + (activePeer === k ? ' active' : '');
    d.innerHTML = `<div class="nc-id">ID: ${k.substring(0,6)}</div>`;
    d.onclick = () => { 
        activePeer=k; 
        $('ch-target').textContent = k.substring(0,6); 
        $('inp-msg').disabled=false; 
        $('btn-send').disabled=false; 
        renderNodes(); 
    };
    $('nodes-scroll').appendChild(d);
  });
}

function appendMsg(v, d, id) {
  const r = document.createElement('div'); r.className = 'cmd-row ' + d;
  r.innerHTML = `<div class="cmd-bubble"><strong>${id.substring(0,4)}:</strong> ${v}</div>`;
  $('console-msgs').appendChild(r);
  $('console-msgs').scrollTop = $('console-msgs').scrollHeight;
}

function log(m, c) {
  const d = document.createElement('div');
  d.style.color = c === 'g' ? '#00ff88' : '#ff3366';
  d.textContent = `[${new Date().toLocaleTimeString()}] ${m}`;
  $('activity-log').appendChild(d);
}

function cleanPeer(pid) {
  if(peers.has(pid)) { 
      peers.get(pid).pc.close(); 
      peers.delete(pid); 
      if(activePeer===pid) {
          activePeer=null;
          $('inp-msg').disabled=true;
          $('btn-send').disabled=true;
      }
      renderNodes(); 
  }
}
</script>
</body>
</html>
